version: "3.8"

services:
  techpath-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techpath-ai-engine
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
